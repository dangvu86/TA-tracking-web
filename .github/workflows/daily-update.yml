name: Daily TA Analysis (manual backup)

# Scheduled runs moved to Cloud Scheduler + Cloud Run /api/generate.
# Kept as manual backup in case Cloud Run/GCP pipeline fails.
on:
  # schedule:
  #   - cron: '45 8 * * 1-5'  # Disabled: replaced by Cloud Scheduler
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Generate analysis
        run: python scripts/generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/latest.json
          git diff --staged --quiet && echo "No changes" && exit 0
          DATA_DATE=$(python -c "import json; print(json.load(open('web/public/data/latest.json'))['meta']['date'])")
          git commit -m "data: update latest.json for ${DATA_DATE}"
          git push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          cd web
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
